version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: shop-sphere-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - shop-sphere-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: shop-sphere-backend
    restart: unless-stopped
    environment:
      CONNECTION_STRING: mongodb://mongodb:27017/shop_sphere
      PORT: 5000
      NODE_ENV: production
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    networks:
      - shop-sphere-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: shop-sphere-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - shop-sphere-network

volumes:
  mongodb_data:


networks:
  shop-sphere-network:
    driver: bridge
