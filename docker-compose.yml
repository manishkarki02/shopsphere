services:
  mongodb:
    image: mongo:latest
    container_name: shop-sphere-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - shop-sphere-data:/data/db
    networks:
      - shop-sphere-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/store-backend/Dockerfile
    container_name: shop-sphere-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=mongodb://mongodb:27017/shop-sphere
      - CORS_ORIGIN=http://localhost:80,http://localhost
      - JWT_SECRET=your_super_secret_jwt_key
      - JWT_EXPIRY=3600
      - ACCESS_TOKEN_SECRET=your-access-token-secret
      - REFRESH_TOKEN_SECRET=your-refresh-token-secret
      - SERVER_URL=http://localhost:3000
      - SMTP_HOST=smtp.example.com
      - SMTP_PORT=587
      - SMTP_EMAIL=test@example.com
      - SMTP_PASSWORD=password
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - shop-sphere-network

  frontend:
    build:
      context: .
      dockerfile: apps/store-frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:3000
    container_name: shop-sphere-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - shop-sphere-network

networks:
  shop-sphere-network:
    driver: bridge

volumes:
  shop-sphere-data:
    driver: local
